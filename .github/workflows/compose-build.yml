name: Docker Compose Build

on:
  pull_request:
    branches: ["**"]
  push:
    branches: ["**"]

permissions:
  contents: read

jobs:
  compose-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build compose images
        run: docker compose build
